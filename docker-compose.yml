services:

  postgres:
    image: postgres:16-alpine
    container_name: polyaqua_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polyaqua
      POSTGRES_USER: polyaqua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # không expose ra host — chỉ API cần kết nối nội bộ
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyaqua"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: polyaqua_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: polyaqua_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://polyaqua:${POSTGRES_PASSWORD}@postgres:5432/polyaqua
      MINIO_ENDPOINT: minio:9000
      HF_HOME: /root/.cache/huggingface
      YOLO_CONFIG_DIR: /tmp/Ultralytics
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./module_vision/models:/app/module_vision/models
      - ./module_rag/data:/app/module_rag/data
      - hf_cache:/root/.cache/huggingface

volumes:
  postgres_data:
  minio_data:
  hf_cache:
