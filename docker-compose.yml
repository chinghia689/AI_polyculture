services:

  postgres:
    image: postgres:16-alpine
    container_name: polyaqua_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polyaqua
      POSTGRES_USER: polyaqua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # không expose ra host — chỉ API cần kết nối nội bộ
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyaqua"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: polyaqua_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: polyaqua_chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chromadb_data:/chroma/chroma
    # không expose ra host — chỉ API cần kết nối nội bộ
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: polyaqua_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://polyaqua:${POSTGRES_PASSWORD}@postgres:5432/polyaqua
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./module_vision/models:/app/module_vision/models
      - ./module_rag/data:/app/module_rag/data

volumes:
  postgres_data:
  minio_data:
  chromadb_data:
