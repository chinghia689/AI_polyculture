services:

  postgres:
    image: postgres:16-alpine
    container_name: polyaqua_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polyaqua
      POSTGRES_USER: polyaqua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polyaqua123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyaqua"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: polyaqua_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: polyaqua_chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chromadb_data:/chroma/chroma
    # port 8000 không expose ra host — chỉ dùng nội bộ qua Docker network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: polyaqua_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://polyaqua:${POSTGRES_PASSWORD:-polyaqua123}@postgres:5432/polyaqua
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./module_vision/models:/app/module_vision/models
      - ./module_rag/data:/app/module_rag/data

volumes:
  postgres_data:
  minio_data:
  chromadb_data:
